# /etc/nginx/sites-available/vaidyagogate-seminar
# Replace YOUR_SERVER_IP after DNS points here.
# sudo ln -s /etc/nginx/sites-available/vaidyagogate-seminar /etc/nginx/sites-enabled/
# sudo certbot --nginx -d seminar.vaidyagogate.org -d admin.vaidyagogate.org -d judge.vaidyagogate.org

upstream vgmf_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name seminar.vaidyagogate.org admin.vaidyagogate.org judge.vaidyagogate.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name seminar.vaidyagogate.org admin.vaidyagogate.org judge.vaidyagogate.org;

    ssl_certificate     /etc/letsencrypt/live/seminar.vaidyagogate.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seminar.vaidyagogate.org/privkey.pem;

    client_max_body_size 25M;

    location / {
        proxy_pass http://vgmf_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

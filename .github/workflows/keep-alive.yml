# Pings production every 10 minutes so Render free tier stays warm (no cold-start wait).
# Also works if Render cron is not deployed — GitHub Actions is free for public repos.
name: Keep alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping production
        run: |
          URL="${KEEP_ALIVE_URL:-https://autism.vaidyagogate.org/api/ping}"
          echo "GET $URL"
          code=$(curl -fsS -o /tmp/ping.json -w "%{http_code}" "$URL" || echo "000")
          echo "HTTP $code"
          cat /tmp/ping.json || true
          test "$code" = "200"
